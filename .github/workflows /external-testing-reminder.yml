name: Need External Testing Reminder (7 days after label)

on:
  schedule:
    - cron: '30 2 * * *'     # 09:30 WIB setiap hari

permissions:
  issues: write
  pull-requests: write

jobs:
  reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Send reminder every 7 days
        uses: actions/github-script@v7
        with:
          script: |
            const labelToCheck = 'Need External Testing';
            const inactivityDays = 7;
            const maxLabelAgeDays = 90;

            const now = Date.now();

            const { data: items } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: labelToCheck,
              per_page: 100
            });

            for (const item of items) {
              const number = item.number;

              const { data: events } = await github.rest.issues.listEventsForTimeline({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                per_page: 100
              });

              const lastLabeledEvent = [...events]
                .reverse()
                .find(e => e.event === 'labeled' && e.label?.name === labelToCheck);

              if (!lastLabeledEvent) continue;

              const daysSinceLabel = (now - new Date(lastLabeledEvent.created_at).getTime()) / (1000 * 60 * 60 * 24);
              if (daysSinceLabel > maxLabelAgeDays) continue;

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number
              });

              if (comments.length === 0) continue;

              const lastCommentDate = new Date(comments[comments.length - 1].created_at);
              const daysSinceLast = (now - lastCommentDate.getTime()) / (1000 * 60 * 60 * 24);

              if (daysSinceLast >= inactivityDays) {
                const reminderBody = `Hi @rachimvdr

            Kindly reminder to provide us the external test result, otherwise close this issue upon its rectified, thanks.

            - @rachimvdr`;

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: number,
                  body: reminderBody
                });

                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: number,
                  labels: ['needs-reply']
                });

                console.log(`Reminder sent to #${number}`);
              }
            }
